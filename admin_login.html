<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f3f6f4; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { background:#fff; padding:24px; border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,0.08); width:360px; }
    h1 { margin-bottom:12px; font-size:1.4rem; }
    input { width:100%; padding:8px; margin:8px 0; border:1px solid #ddd; border-radius:6px; }
    button { width:100%; padding:10px; background:#27ae60; color:#fff; border:none; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    <input id="adminUser" placeholder="Username" />
    <input id="adminPass" type="password" placeholder="Password" />
    <button id="adminLoginBtn">Login</button>
  </div>
  <script>
    document.getElementById("adminLoginBtn").addEventListener("click", async () => {
      const username = document.getElementById("adminUser").value.trim();
      const password = document.getElementById("adminPass").value.trim();
      if (!username || !password) {
        alert("Enter admin username and password.");
        return;
      }
      const res = await fetch("http://127.0.0.1:8000/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({ username, password })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert(err.detail || "Login failed.");
        return;
      }
      const data = await res.json();
      localStorage.setItem("adminToken", data.token);
      localStorage.setItem("adminUser", data.username);
      window.location.href = "/admin_dashboard.html";
    });
  </script>
</body>
</html>
