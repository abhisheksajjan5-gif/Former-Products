<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments</title>
  <style>
    :root {
      --bg:#f5f7f2; --card:#fff; --text:#1f2a44; --muted:#5d6b82;
      --accent:#1f7a5c; --border:#e4ece6; --shadow:0 18px 40px rgba(19,43,31,0.08);
    }
    body { font-family: "Segoe UI", Tahoma, sans-serif; background:var(--bg); padding:24px; color:var(--text); }
    .card { background:var(--card); border-radius:16px; padding:20px; max-width:860px; margin:0 auto; box-shadow:var(--shadow); border:1px solid var(--border); }
    h1 { margin-bottom:6px; }
    .sub { color:var(--muted); font-size:0.95rem; margin-bottom:12px; }
    .empty { color:var(--muted); }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px; border-bottom:1px solid var(--border); }
    th { color:var(--muted); font-weight:600; }
    a { color:var(--accent); text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Payments</h1>
    <div class="sub">Payment history and status</div>
    <div id="content"></div>
    <p><a href="/formerproject.html">Back</a></p>
  </div>
  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const content = document.getElementById("content");

    const token = localStorage.getItem("authToken") || "";
    if (!token) {
      content.innerHTML = '<p class="empty">Please login first.</p>';
    } else {
      fetch(`${API_BASE}/api/payments`, {
        headers: { "Authorization": `Bearer ${token}` }
      })
      .then(r => {
        if (r.status === 401) {
          localStorage.removeItem("authToken");
          content.innerHTML = '<p class="empty">Session expired. Please login again.</p>';
          return null;
        }
        return r.json();
      })
      .then(rows => {
        if (!rows) return;
        if (!Array.isArray(rows) || rows.length === 0) {
          content.innerHTML = '<p class="empty">No payment data found.</p>';
          return;
        }
        const html = `
          <table>
            <thead>
              <tr><th>ID</th><th>Order ID</th><th>Amount</th><th>Method</th><th>Status</th><th>Date</th></tr>
            </thead>
            <tbody>
              ${rows.map(r => `<tr>
                <td>${r.id}</td>
                <td>${r.order_id ?? "-"}</td>
                <td>${r.amount}</td>
                <td>${r.method}</td>
                <td>${r.status}</td>
                <td>${r.created_at}</td>
              </tr>`).join("")}
            </tbody>
          </table>
        `;
        content.innerHTML = html;
      })
      .catch(() => {
        content.innerHTML = '<p class="empty">Unable to load payments.</p>';
      });
    }
  </script>
</body>
</html>
