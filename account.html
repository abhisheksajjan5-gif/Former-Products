<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Details</title>
  <style>
    :root{
      --bg:#f4f6f0; --ink:#1b2b3a; --muted:#6a7b85;
      --accent:#0f7b6c; --accent-2:#0b5f55;
      --card:#ffffff; --border:#e6ece7; --shadow:0 14px 34px rgba(15,40,32,0.1);
    }
    body{
      font-family:"Segoe UI", Tahoma, sans-serif;
      background:radial-gradient(1200px 400px at 20% -10%, #e7f3ec 0%, rgba(231,243,236,0) 60%), var(--bg);
      padding:24px; color:var(--ink);
    }
    .card{
      max-width:640px; margin:0 auto; background:var(--card);
      border-radius:18px; padding:22px; border:1px solid var(--border);
      box-shadow:var(--shadow);
    }
    .header{ display:flex; align-items:center; gap:14px; margin-bottom:14px; }
    .avatar{
      width:54px; height:54px; border-radius:14px;
      background:linear-gradient(135deg, #c9f2e3, #e7f7f0);
      color:var(--accent); font-weight:800; display:flex; align-items:center; justify-content:center;
      font-size:1.4rem;
    }
    h1{ margin:0; font-size:1.5rem; }
    .sub{ color:var(--muted); font-size:0.95rem; margin-top:4px; }
    .grid{ display:grid; gap:10px; margin-top:16px; }
    .row{
      display:grid; grid-template-columns:140px 1fr; gap:10px;
      padding:4px 0;
    }
    .label{ color:var(--muted); font-size:0.9rem; text-transform:uppercase; letter-spacing:0.04em; }
    .value{ font-weight:700; color:var(--ink); }
    .badge{ display:inline-block; background:rgba(15,123,108,0.12); color:var(--accent); padding:4px 10px; border-radius:999px; font-size:0.85rem; font-weight:700; }
    .empty{ color:var(--muted); }
    a{ color:var(--accent); text-decoration:none; font-weight:700; }
    a:hover{ color:var(--accent-2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="avatar" id="avatar">U</div>
      <div>
        <h1>Account Details</h1>
        <div class="sub">Your profile information</div>
      </div>
    </div>
    <div id="content"></div>
    <p><a href="/formerproject.html">Back</a></p>
  </div>
  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const content = document.getElementById("content");

    const token = localStorage.getItem("authToken") || "";
    if (!token) {
      content.innerHTML = '<p class="empty">Please login first.</p>';
    } else {
      fetch(`${API_BASE}/api/account`, {
        headers: { "Authorization": `Bearer ${token}` }
      })
      .then(r => {
        if (r.status === 401) {
          localStorage.removeItem("authToken");
          content.innerHTML = '<p class="empty">Session expired. Please login again.</p>';
          return null;
        }
        return r.json();
      })
      .then(d => {
        if (!d) return;
        if (d.detail) {
          content.innerHTML = `<p class="empty">${d.detail}</p>`;
          return;
        }
        content.innerHTML = `
          <div class="grid">
            <div class="row"><div class="label">User Name</div> <div class="value">${d.name || "-"}</div></div>
            <div class="row"><div class="label">Email</div> <div class="value">${d.username || "-"}</div></div>
            <div class="row"><div class="label">User ID</div> <div class="value">${d.id}</div></div>
          </div>
        `;
        const avatar = document.getElementById("avatar");
        const initial = (d.name || d.username || "U").trim().charAt(0).toUpperCase();
        avatar.textContent = initial || "U";
      })
      .catch(() => {
        content.innerHTML = '<p class="empty">Unable to load account details.</p>';
      });
    }
  </script>
</body>
</html>
