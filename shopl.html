<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FarmFresh | Order</title>
  <style>
    :root {
      --primary: #27ae60;
      --dark: #2c3e50;
      --bg: #f3f6f4;
      --white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      padding: 28px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.6rem; margin-bottom: 10px; }
    p { margin: 12px 0; }
    .btn {
      display: inline-block;
      margin-top: 12px;
      background: var(--primary);
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Order Page</h1>
    <p>This is a placeholder for the purchase flow.</p>
    <p>You can connect this page to your cart/checkout later.</p>
    <a class="btn" href="/formerproject.html">Back to Products</a>
  </div>
</body>
</html>
