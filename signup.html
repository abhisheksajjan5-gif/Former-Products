<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Create Account | FarmFresh</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@500;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #2691d9;
      --primary-hover: #1a6fb3;
      --secondary-color: #f8f9fa;
      --text-color: #333;
      --light-gray: #adadad;
      --border-radius: 8px;
      --box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                  url('https://images.pexels.com/photos/31472288/pexels-photo-31472288/free-photo-of-idyllic-evening-landscape-with-lone-tree.jpeg')
                  no-repeat center center / cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-color);
    }

    .signup-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: var(--border-radius);
      padding: 2.5rem;
      box-shadow: var(--box-shadow);
    }

    .signup-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .signup-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .form-group { position: relative; margin-bottom: 1.5rem; }

    .form-group label {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--light-gray);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none;
    }

    .form-control {
      width: 100%;
      padding: 0.75rem 0.75rem 0.75rem 2.5rem;
      border: none;
      border-bottom: 2px solid var(--light-gray);
      font-size: 1rem;
      background: transparent;
      transition: all 0.3s ease;
    }

    .form-control:focus { outline: none; border-bottom-color: var(--primary-color); }
    .form-control:focus + label,
    .form-control:not(:placeholder-shown) + label {
      top: -0.5rem;
      font-size: 0.8rem;
      color: var(--primary-color);
    }

    .btn-signup {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: var(--border-radius);
      background-color: var(--primary-color);
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn-signup:hover { background-color: var(--primary-hover); }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
    }

    .login-link a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-header">
      <h2><i class="fas fa-user-plus"></i> Create Account</h2>
    </div>

    <form id="signupForm" novalidate autocomplete="off">
      <div class="form-group">
        <input type="text" class="form-control" id="name" placeholder=" " required>
        <label for="name"><i class="fas fa-user"></i> Full Name</label>
      </div>
      <div class="form-group">
        <input type="email" class="form-control" id="email" placeholder=" " required>
        <label for="email"><i class="fas fa-envelope"></i> Email</label>
      </div>
      <div class="form-group">
        <input type="password" class="form-control" id="password" placeholder=" " required>
        <label for="password"><i class="fas fa-lock"></i> Password</label>
      </div>
      <div class="form-group">
        <input type="password" class="form-control" id="confirmPassword" placeholder=" " required>
        <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
      </div>

      <button type="submit" class="btn-signup">Create Account</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="/formerlogin.html">Login</a>
    </div>
  </div>

  <script>
    function handleLoginSuccess(userData) {
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userData', JSON.stringify({
        username: userData.username,
        userid: userData.id,
        id: userData.id
      }));
      window.location.href = '/formerproject.html';
    }

    const API_BASE = "http://127.0.0.1:8000";
    const signupForm = document.getElementById('signupForm');

    signupForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (!name || !email || !password || !confirmPassword) {
        alert('Please fill in all required fields.');
        return;
      }
      if (password !== confirmPassword) {
        alert('Passwords do not match.');
        return;
      }

      try {
      const res = await fetch(`${API_BASE}/api/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          alert(err.detail || 'Unable to create account.');
          return;
        }

        const data = await res.json();
        handleLoginSuccess(data);
      } catch (err) {
        alert('Unable to reach server. Please try again.');
      }
    });
  </script>
</body>
</html>
